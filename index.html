<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Digital Products Only Mall</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0d1b2a;
            background-image: linear-gradient(to bottom, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Top Main Logo */
        .top-logo {
            width: 220px;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .mall-text {
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Card Design */
        .auth-card {
            width: 100%;
            max-width: 360px;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Seller Card - Circuit Blue */
        .seller-card {
            background: linear-gradient(135deg, #d4eaf7 0%, #b8d4e9 100%);
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
        }

        /* Customer Card - Lavender Leaves */
        .customer-card {
            background: linear-gradient(135deg, #e0c3fc 0%, #fbc2eb 100%);
            background-image: url('https://www.transparenttextures.com/patterns/leaves.png');
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .label-row i {
            background: #d4af37;
            color: white;
            padding: 6px;
            border-radius: 50%;
            font-size: 12px;
        }

        /* GitHub က Logo.png နဲ့ ချိတ်ဆက်မှု */
        .card-logo {
            display: block;
            width: 130px;
            margin: 15px auto;
        }

        /* Google Sign-in Buttons */
        .google-btn {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 10px;
        }

        /* Golden Button */
        .btn-gold {
            background: linear-gradient(to right, #d4af37, #f1d592, #d4af37);
            color: #0f172a;
        }

        /* Silver/White Button */
        .btn-white {
            background: linear-gradient(to right, #e2e8f0, #ffffff, #e2e8f0);
            color: #0f172a;
        }

        .g-icon { width: 18px; }

        footer {
            margin-top: auto;
            color: #64748b;
            font-size: 11px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <img src="Logo.png" class="top-logo" alt="Veloria">
    <div class="mall-text">DIGITAL PRODUCTS ONLY MALL</div>

    <div class="auth-card seller-card">
        <div class="label-row"><i class="fa-solid fa-user-tie"></i> Seller Account</div>
        <img src="Logo.png" class="card-logo">
        <button class="google-btn btn-gold" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="g-icon">
            Sign in with Google
        </button>
    </div>

    <div class="auth-card customer-card">
        <div class="label-row"><i class="fa-solid fa-user"></i> Customer Account</div>
        <img src="Logo.png" class="card-logo">
        <button class="google-btn btn-white" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="g-icon">
            Sign in with Google
        </button>
    </div>

    <footer>© 2025 Veloria. All rights reserved.</footer>

    <script>
        // ဘရိုပေးထားတဲ့ Firebase Config အတိအကျ
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            // Gemini လိုမျိုး Google account ရွေးခိုင်းတဲ့ box ပေါ်အောင် လုပ်ထားတယ်
            provider.setCustomParameters({ prompt: 'select_account' });

            auth.signInWithPopup(provider)
                .then((result) => {
                    // အောင်မြင်ရင် home.html ကို သွားမယ်
                    window.location.href = "home.html";
                })
                .catch((error) => {
                    alert("အကောင့်ဝင်လို့မရပါဘူး: " + error.message);
                });
        }
    </script>
</body>
</html>
