<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Authentication</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0d1b2a;
            background-image: linear-gradient(to bottom, #0d1b2a, #1b263b);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        /* ပုံထဲက အပေါ်ဆုံး Logo */
        .top-main-logo {
            width: 240px;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 11px;
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Card ဒီဇိုင်း (ပုံထဲကအတိုင်း အဝိုင်းသားလေးတွေ) */
        .auth-card {
            width: 100%;
            max-width: 380px;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Seller Card: အပြာနုရောင် Circuit pattern */
        .seller-card {
            background: linear-gradient(135deg, #d8e9f5 0%, #b8d4e9 100%);
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            color: #1b263b;
        }

        /* Customer Card: ခရမ်းနုရောင် သစ်ရွက် pattern */
        .customer-card {
            background: linear-gradient(135deg, #e3d2f7 0%, #fbc2eb 100%);
            background-image: url('https://www.transparenttextures.com/patterns/leaves.png');
            color: #2d132c;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 17px;
            margin-bottom: 10px;
        }

        .label-row i {
            background: #d4af37;
            color: white;
            padding: 7px;
            border-radius: 50%;
            font-size: 12px;
        }

        /* Card ထဲက Logo */
        .inner-logo {
            display: block;
            width: 130px;
            margin: 15px auto;
        }

        /* Google Buttons (ပုံထဲကအတိုင်း အလှဆုံး) */
        .google-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        /* Seller - Golden Button */
        .btn-seller {
            background: linear-gradient(to right, #c5a059, #f1d592, #c5a059);
            color: #1b263b;
        }

        /* Customer - Silver White Button */
        .btn-customer {
            background: linear-gradient(to right, #bdc3c7, #ffffff, #bdc3c7);
            color: #1b263b;
        }

        .g-logo { width: 20px; }

        footer {
            margin-top: auto;
            color: #64748b;
            font-size: 12px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <img src="Logo.png" class="top-main-logo">
    <div class="tagline">DIGITAL PRODUCTS ONLY MALL</div>

    <div class="auth-card seller-card">
        <div class="label-row"><i class="fa-solid fa-user-tie"></i> Seller Account</div>
        <img src="Logo.png" class="inner-logo">
        <button class="google-btn btn-seller" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="g-logo">
            Sign in with Google
        </button>
    </div>

    <div class="auth-card customer-card">
        <div class="label-row"><i class="fa-solid fa-user"></i> Customer Account</div>
        <img src="Logo.png" class="inner-logo">
        <button class="google-btn btn-customer" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="g-logo">
            Sign in with Google
        </button>
    </div>

    <footer>© 2025 Veloria. All rights reserved.</footer>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Google အကောင့်အမြဲရွေးခိုင်းဖို့
            provider.setCustomParameters({ prompt: 'select_account' });

            auth.signInWithPopup(provider)
                .then((result) => {
                    window.location.href = "home.html";
                })
                .catch((error) => {
                    alert("အကောင့်ဝင်လို့မရပါဘူး: " + error.message);
                });
        }
    </script>
</body>
</html>
