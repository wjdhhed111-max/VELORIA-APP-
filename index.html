<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Authentication</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d1b2a;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
            overflow-x: hidden;
        }

        /* Top Logo */
        .main-top-logo {
            width: 260px;
            margin-bottom: 5px;
        }

        .mall-tagline {
            font-size: 11px;
            letter-spacing: 2.5px;
            color: #94a3b8;
            font-weight: 800;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Card Container - ပုံထဲကအတိုင်း အတိအကျ */
        .auth-card {
            width: 100%;
            max-width: 380px;
            border-radius: 35px;
            padding: 28px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Seller Card: Blue Circuit Style */
        .seller-card {
            background: linear-gradient(135deg, #d8e9f5 0%, #b8d4e9 100%);
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            color: #1b263b;
        }

        /* Customer Card: Purple Leaves Style */
        .customer-card {
            background: linear-gradient(135deg, #e3d2f7 0%, #fbc2eb 100%);
            background-image: url('https://www.transparenttextures.com/patterns/leaves.png');
            color: #2d132c;
        }

        .role-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .role-header i {
            background: #d4af37;
            color: white;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 13px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Card ထဲက Logo */
        .card-inner-logo {
            display: block;
            width: 140px;
            margin: 20px auto;
        }

        /* Google Sign-in Button (အတိအကျပုံစံ) */
        .google-login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        /* Seller Golden Button */
        .btn-gold {
            background: linear-gradient(180deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
            color: #1b263b;
        }

        /* Customer Silver Button */
        .btn-silver {
            background: linear-gradient(180deg, #bdc3c7 0%, #ffffff 50%, #bdc3c7 100%);
            color: #1b263b;
        }

        .google-logo-img { width: 22px; }

        footer {
            margin-top: auto;
            color: #64748b;
            font-size: 13px;
            padding-bottom: 10px;
        }

        /* Loading Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1b2a; display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="Logo.png" width="150"></div>

    <img src="Logo.png" class="main-top-logo">
    <div class="mall-tagline">DIGITAL PRODUCTS ONLY MALL</div>

    <div class="auth-card seller-card">
        <div class="role-header"><i class="fa-solid fa-user-tie"></i> Seller Account</div>
        <img src="Logo.png" class="card-inner-logo">
        <button class="google-login-btn btn-gold" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="google-logo-img">
            Sign in with Google
        </button>
    </div>

    <div class="auth-card customer-card">
        <div class="role-header"><i class="fa-solid fa-user"></i> Customer Account</div>
        <img src="Logo.png" class="card-inner-logo">
        <button class="google-login-btn btn-silver" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="google-logo-img">
            Sign in with Google
        </button>
    </div>

    <footer>© 2025 Veloria. All rights reserved.</footer>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ၁။ အရေးကြီးဆုံး logic - အကောင့်ဝင်ပြီးသားဆိုရင် Home ကို တန်းပို့မယ်
        auth.onAuthStateChanged(user => {
            if (user) {
                // အကောင့်ဝင်ပြီးသားဖြစ်နေရင် index မှာ မနေတော့ဘဲ home.html ကို တန်းသွားမယ်
                window.location.href = "home.html";
            } else {
                // အကောင့်မဝင်ရသေးမှသာ splash screen ကို ဖျောက်ပြီး login page ပြမယ်
                document.getElementById('splash-screen').style.display = 'none';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Gemini လိုပဲ အကောင့်ရွေးခိုင်းတာ အမြဲပေါ်စေဖို့
            provider.setCustomParameters({ prompt: 'select_account' });

            auth.signInWithPopup(provider)
                .then((result) => {
                    window.location.href = "home.html";
                })
                .catch((error) => {
                    alert("အကောင့်ဝင်ရာတွင် အမှားအယွင်းရှိပါသည်- " + error.message);
                });
        }
    </script>
</body>
</html>
