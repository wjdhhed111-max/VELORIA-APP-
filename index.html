<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Authentication</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 40px 20px;
        }

        .top-logo { width: 220px; margin-bottom: 5px; }
        .tagline { font-size: 10px; letter-spacing: 2px; color: #94a3b8; margin-bottom: 40px; font-weight: 800; }

        /* Glassmorphism Card Style - ပုံထဲကအတိုင်း အတိအကျ */
        .card {
            width: 100%;
            max-width: 360px;
            background: rgba(30, 41, 59, 0.7); /* အမှောင်ရောင် အလင်းဖောက် */
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .acc-type { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 18px; margin-bottom: 15px; }
        .acc-type i { color: #f1d592; font-size: 20px; }

        .inner-logo { display: block; width: 130px; margin: 15px auto; }

        /* Sign In Buttons - ပုံထဲကလို Gradient အလှလေးတွေ */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gold { 
            background: linear-gradient(to right, #d4af37, #f1d592, #d4af37); 
            color: #0f172a; 
        }

        .btn-silver { 
            background: linear-gradient(to right, #bdc3c7, #ffffff, #bdc3c7); 
            color: #0f172a; 
        }

        .google-icon { width: 20px; }

        /* Splash Screen Logic */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; justify-content: center;
            align-items: center; z-index: 999;
        }
    </style>
</head>
<body>

    <div id="loading"><img src="Logo.png" width="100"></div>

    <img src="Logo.png" class="top-logo">
    <div class="tagline">DIGITAL PRODUCTS ONLY MALL</div>

    <div class="card">
        <div class="acc-type"><i class="fa-solid fa-circle-user"></i> Seller Account</div>
        <img src="Logo.png" class="inner-logo">
        <button class="btn btn-gold" onclick="signIn()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="google-icon">
            Sign in with Google
        </button>
    </div>

    <div class="card">
        <div class="acc-type"><i class="fa-solid fa-circle-user"></i> Customer Account</div>
        <img src="Logo.png" class="inner-logo">
        <button class="btn btn-silver" onclick="signIn()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="google-icon">
            Sign in with Google
        </button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // အကောင့်ဝင်ပြီးသားဆိုရင် Home ကို တန်းပို့မယ့် logic
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = "home.html";
            } else {
                document.getElementById('loading').style.display = 'none';
            }
        });

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithPopup(provider).then(() => {
                window.location.href = "home.html";
            }).catch(err => alert(err.message));
        }
    </script>
</body>
</html>
