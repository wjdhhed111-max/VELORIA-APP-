<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Authentication</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d1b2a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        /* Top Logo */
        .top-logo { width: 220px; margin-bottom: 5px; }
        .tagline {
            font-size: 11px; letter-spacing: 2.5px; color: #94a3b8;
            font-weight: 800; margin-bottom: 35px; text-transform: uppercase;
        }

        /* Card Designs (ပုံထဲကအတိုင်း အတိအကျ) */
        .auth-card {
            width: 100%; max-width: 370px; border-radius: 30px;
            padding: 25px; margin-bottom: 25px; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Seller: Blue Circuit Style */
        .seller-card {
            background: linear-gradient(135deg, #d8e9f5 0%, #b8d4e9 100%);
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            color: #1b263b;
        }

        /* Customer: Purple Leaves Style */
        .customer-card {
            background: linear-gradient(135deg, #e3d2f7 0%, #fbc2eb 100%);
            background-image: url('https://www.transparenttextures.com/patterns/leaves.png');
            color: #2d132c;
        }

        .header-row {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 17px; margin-bottom: 10px;
        }

        .header-row i {
            background: #d4af37; color: white; width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 12px;
        }

        .inner-logo { display: block; width: 130px; margin: 15px auto; }

        /* Google Buttons (ပုံထဲကအတိုင်း Gradient အလှဆုံး) */
        .google-btn {
            width: 100%; padding: 14px; border-radius: 50px; border: none;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; font-weight: 700; font-size: 16px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Seller - Gold Gradient */
        .btn-gold {
            background: linear-gradient(180deg, #c5a059 0%, #f1d592 50%, #c5a059 100%);
            color: #1b263b;
        }

        /* Customer - Silver Gradient */
        .btn-silver {
            background: linear-gradient(180deg, #bdc3c7 0%, #ffffff 50%, #bdc3c7 100%);
            color: #1b263b;
        }

        /* Google Logo SVG */
        .g-logo { width: 20px; }

        footer { margin-top: auto; color: #64748b; font-size: 11px; padding-bottom: 10px; }

        /* Splash Screen Logic */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1b2a; display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="splash"><img src="Logo.png" width="150"></div>

    <img src="Logo.png" class="top-logo">
    <div class="tagline">DIGITAL PRODUCTS ONLY MALL</div>

    <div class="auth-card seller-card">
        <div class="header-row"><i class="fa-solid fa-user-tie"></i> Seller Account</div>
        <img src="Logo.png" class="inner-logo">
        <button class="google-btn btn-gold" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="g-logo">
            Sign in with Google
        </button>
    </div>

    <div class="auth-card customer-card">
        <div class="header-row"><i class="fa-solid fa-user"></i> Customer Account</div>
        <img src="Logo.png" class="inner-logo">
        <button class="google-btn btn-silver" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="g-logo">
            Sign in with Google
        </button>
    </div>

    <footer>© 2025 Veloria. All rights reserved.</footer>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // အကောင့်ဝင်ပြီးသားဆိုရင် Home ကို တန်းပို့မယ့် Logic
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = "home.html";
            } else {
                document.getElementById('splash').style.display = 'none';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithPopup(provider).then(() => {
                window.location.href = "home.html";
            }).catch(err => alert(err.message));
        }
    </script>
</body>
</html>
