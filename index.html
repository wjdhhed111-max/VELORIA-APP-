<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Official Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body {
            background-color: #0d1b2a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .main-logo { width: 180px; margin-bottom: 30px; }
        .card {
            width: 100%;
            max-width: 350px;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .seller-card { background-color: #d1e3e9; color: #1b263b; }
        .customer-card { background-color: #e2d1f9; color: #1b263b; }
        .inner-logo { width: 80px; margin-bottom: 15px; }
        
        .google-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .seller-btn { background: linear-gradient(45deg, #b8860b, #ffd700); color: #1b263b; }
        .customer-btn { background: linear-gradient(45deg, #bdc3c7, #ffffff); color: #1b263b; }
        
        /* Google Logo အရွယ်အစားသတ်မှတ်ချက် */
        .google-icon { 
            width: 22px; 
            height: 22px; 
            margin-right: 12px; 
            object-fit: contain;
        }
        .footer-text { font-size: 12px; margin-top: 30px; opacity: 0.6; }
    </style>
</head>
<body>

    <img src="Logo.png" alt="Veloria" class="main-logo">

    <div class="card seller-card">
        <h3 style="margin-top:0">Seller Account</h3>
        <img src="Logo.png" class="inner-logo">
        <button class="google-btn seller-btn" onclick="login()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" class="google-icon">
            Sign in with Google
        </button>
    </div>

    <div class="card customer-card">
        <h3 style="margin-top:0">Customer Account</h3>
        <img src="Logo.png" class="inner-logo">
        <button class="google-btn customer-btn" onclick="login()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" class="google-icon">
            Sign in with Google
        </button>
    </div>

    <div class="footer-text">© 2025 Veloria. All rights reserved.</div>

    <script>
        auth.onAuthStateChanged(user => {
    if (user) {
        // အကောင့်ရှိနေပြီးသားဆိုရင် Selection ပြစရာမလိုဘဲ Home ကို တန်းပို့မယ်
        window.location.href = "home.html";
    }
});
        
        // ဘရိုရဲ့ Config အသစ်
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    // Login အောင်မြင်ရင် home.html ကို သွားမယ်
                    window.location.href = "home.html";
                }).catch((error) => {
                    console.error(error);
                    alert("Error: " + error.message);
                });
        }
    </script>
</body>
</html>
