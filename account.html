<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - My Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #ffffff;
            --secondary: #f4f7f6;
            --accent: #4834d4;
            --gold: #b88e2f;
            --dark: #2d3436;
        }
        body {
            background-color: var(--secondary);
            color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        /* Profile Banner */
        .profile-banner {
            background: linear-gradient(135deg, #1b263b 0%, #415a77 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
        }
        #user-img {
            width: 85px; height: 85px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 15px;
            object-fit: cover;
        }
        .user-name { font-size: 20px; font-weight: 800; display: block; }

        /* Wallet Card */
        .wallet-card {
            background: white;
            margin: -25px 20px 20px 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .coin-balance { font-size: 24px; font-weight: 800; color: var(--gold); }
        .buy-coin-btn {
            background: var(--gold);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        /* Chart & History Sections */
        .section-box {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .section-title { font-weight: 800; margin-bottom: 15px; display: block; font-size: 15px; }

        /* History Table */
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table th { text-align: left; padding: 10px; border-bottom: 1px solid #eee; color: #636e72; }
        .history-table td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 12px 0;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
        }
        .nav-item { text-align: center; color: #b2bec3; text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-banner">
        <img id="user-img" src="https://via.placeholder.com/85" alt="User">
        <span class="user-name" id="user-name">Loading...</span>
        <span style="font-size: 12px; opacity: 0.7;">Customer Account</span>
    </div>

    <div class="wallet-card">
        <div>
            <small style="color:#636e72">My Balance</small><br>
            <span class="coin-balance" id="coin-balance">0</span> <small>VC</small>
        </div>
        <a href="coin.html" class="buy-coin-btn">Top-up VC</a>
    </div>

    <div class="section-box">
        <span class="section-title">📊 Spending Analytics</span>
        <canvas id="expenseChart" height="180"></canvas>
    </div>

    <div class="section-box">
        <span class="section-title">🛍 Recent Purchases</span>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Date</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="purchase-list">
                <tr>
                    <td colspan="3" style="text-align:center; padding:20px; color:#ccc;">No data available</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <a href="policy.html" style="color: #b2bec3; font-size: 12px; text-decoration: none;">
            <i class="fa-solid fa-shield-halved"></i> Terms & Policy
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="shops.html" class="nav-item"><i class="fa-solid fa-store"></i><span>Shops</span></a>
        <a href="coin.html" class="nav-item"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
        <a href="account.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>Account</span></a>
    </nav>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let expenseChart; // Global variable for chart

        // --- 2. AUTH & DATA SYNC ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;

                // Sync Wallet Balance
                db.ref('users/' + user.uid + '/balance').on('value', snap => {
                    document.getElementById('coin-balance').innerText = (snap.val() || 0).toLocaleString();
                });

                // Init Chart
                initChart();
                
                // Load Realtime Data for Chart & Table
                loadUserHistory(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        // --- 3. CHART LOGIC (ဘရိုခွဲထုတ်ချင်တဲ့ အပိုင်း) ---
        function initChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            expenseChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [], // Dates
                    datasets: [{
                        label: 'Spent VC',
                        data: [], // Amounts
                        borderColor: '#4834d4',
                        backgroundColor: 'rgba(72, 52, 212, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function loadUserHistory(uid) {
            const historyRef = db.ref('users/' + uid + '/purchase_history');
            
            historyRef.on('value', snap => {
                const data = snap.val();
                const tableBody = document.getElementById('purchase-list');
                tableBody.innerHTML = ""; // Clear existing

                if (data) {
                    let dates = [];
                    let costs = [];

                    Object.values(data).forEach(item => {
                        // Table Update
                        let row = `<tr>
                            <td>${item.productName}</td>
                            <td>${item.date}</td>
                            <td style="font-weight:bold;">-${item.price} VC</td>
                        </tr>`;
                        tableBody.innerHTML += row;

                        // Chart Data Preparation
                        dates.push(item.date);
                        costs.push(item.price);
                    });

                    // Update Chart Visuals
                    expenseChart.data.labels = dates;
                    expenseChart.data.datasets[0].data = costs;
                    expenseChart.update();
                }
            });
        }
    </script>
</body>
</html>
