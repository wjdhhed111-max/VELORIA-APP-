<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Customer Account</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #ffffff;
            --secondary: #f4f7f6;
            --accent: #4834d4;
            --gold: #b88e2f;
            --dark: #2d3436;
        }
        body {
            background-color: var(--secondary);
            color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        /* Profile Banner */
        .profile-banner {
            background: linear-gradient(135deg, #1b263b 0%, #415a77 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
        }
        #user-img {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 15px;
        }
        .user-name { font-size: 20px; font-weight: 800; display: block; }
        .user-role { font-size: 12px; opacity: 0.7; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 10px; }

        /* Wallet Card */
        .wallet-card {
            background: white;
            margin: -25px 20px 20px 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .coin-balance { font-size: 24px; font-weight: 800; color: var(--gold); }
        .buy-coin-btn {
            background: var(--gold);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        /* Expenditure Chart Section */
        .section-box {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
        }
        .section-title { font-weight: 800; margin-bottom: 15px; display: block; font-size: 15px; }

        /* Purchase History Table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .history-table th { text-align: left; padding: 10px; border-bottom: 1px solid #eee; color: #636e72; }
        .history-table td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; }
        .download-btn { color: var(--accent); cursor: pointer; font-size: 14px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 12px 0;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
        }
        .nav-item { text-align: center; color: #b2bec3; text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="profile-banner">
        <img id="user-img" src="https://via.placeholder.com/90" alt="User">
        <span class="user-name" id="user-name">Loading...</span>
        <span class="user-role">Customer Account</span>
    </div>

    <div class="wallet-card">
        <div>
            <small style="color:#636e72">My Balance</small><br>
            <span class="coin-balance" id="coin-balance">0</span> <small>VC</small>
        </div>
        <a href="coin.html" class="buy-coin-btn"><i class="fa-solid fa-cart-plus"></i> Buy Coin</a>
    </div>

    <div class="section-box">
        <span class="section-title">📊 Expenditure Analysis (Monthly)</span>
        <canvas id="expenseChart" height="200"></canvas>
    </div>

    <div class="section-box">
        <span class="section-title">🛍 Purchase History</span>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Date</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="purchase-list">
                <tr>
                    <td>Python Guide PDF</td>
                    <td>14 May, 2026</td>
                    <td>500 VC</td>
                    <td><i class="fa-solid fa-cloud-arrow-down download-btn"></i></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <a href="policy.html" style="color: #636e72; font-size: 12px; text-decoration: none;">
            <i class="fa-solid fa-shield-check"></i> Terms & Anti-Copy Policy
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="shops.html" class="nav-item"><i class="fa-solid fa-store"></i><span>Shops</span></a>
        <a href="coin.html" class="nav-item"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
        <a href="account.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>Account</span></a>
    </nav>

    <script>
        // Firebase Configuration (ဘရိုရဲ့ config ကို အောက်မှာ ပြန်ထည့်ပါ)
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;

                // Coin Balance Sync
                db.ref('users/' + user.uid + '/balance').on('value', snap => {
                    document.getElementById('coin-balance').innerText = snap.val() || 0;
                });
            } else {
                window.location.href = "index.html";
            }
        });

        // Expenditure Graph (Chart.js)
        const ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                datasets: [{
                    label: 'Spent Coins',
                    data: [1200, 1900, 800, 1500, 2500],
                    borderColor: '#4834d4',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(72, 52, 212, 0.1)'
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    </script>
</body>
              </html>
