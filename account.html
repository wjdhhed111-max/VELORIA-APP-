<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Account Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #b88e2f; --dark: #0f172a; --red: #e11d48; }
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; }

        .header-banner {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 50px 20px; text-align: center; color: white;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .img-box { position: relative; display: inline-block; cursor: pointer; }
        #user-img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 4px solid var(--gold); object-fit: cover; background: #334155;
        }
        .cam-btn {
            position: absolute; bottom: 5px; right: 5px; background: var(--gold);
            width: 30px; height: 30px; border-radius: 50%; border: 3px solid #1e293b;
            display: flex; align-items: center; justify-content: center;
        }

        .balance-card {
            background: white; margin: -30px 25px 20px 25px; padding: 25px;
            border-radius: 25px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .main-card { background: white; margin: 20px; padding: 20px; border-radius: 20px; }
        
        /* Sign Out Button */
        .signout-btn {
            background: #fff; color: var(--red); border: 2px solid var(--red);
            padding: 12px; margin: 10px 20px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .signout-btn:active { background: var(--red); color: white; }

        .footer-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            padding: 15px 0; display: flex; border-top: 1px solid #e2e8f0; z-index: 100;
        }
        .nav-tab { flex: 1; text-align: center; color: #94a3b8; text-decoration: none; font-size: 11px; }
        .nav-tab.active { color: var(--gold); }
        .nav-tab i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <input type="file" id="file-input" accept="image/*" style="display:none">

    <div class="header-banner">
        <div class="img-box" onclick="document.getElementById('file-input').click()">
            <img id="user-img" src="https://via.placeholder.com/100" alt="Profile">
            <div class="cam-btn"><i class="fa-solid fa-camera"></i></div>
        </div>
        <h3 id="u-name" style="margin-top: 15px; font-weight: 800;">...</h3>
    </div>

    <div class="balance-card">
        <div><small>VC Balance</small><br><span id="u-balance" style="font-size: 26px; font-weight: 800; color: var(--gold);">0</span></div>
        <a href="coin.html" style="background: var(--dark); color: white; padding: 12px 20px; border-radius: 15px; text-decoration: none; font-weight: 700;">TOP UP</a>
    </div>

    <div class="main-card">
        <span style="font-weight: 800;">📊 Analysis</span>
        <canvas id="myChart" height="180"></canvas>
    </div>

    <div onclick="signOutUser()" class="signout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
    </div>

    <nav class="footer-nav">
        <a href="home.html" class="nav-tab"><i class="fa-solid fa-house"></i>Home</a>
        <a href="shops.html" class="nav-tab"><i class="fa-solid fa-store"></i>Shops</a>
        <a href="coin.html" class="nav-tab"><i class="fa-solid fa-wallet"></i>Wallet</a>
        <a href="account.html" class="nav-tab active"><i class="fa-solid fa-user"></i>Account</a>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let myChart;

        // --- Auth Monitoring ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName;
                
                // ၁။ User Data Sync (Gemini လိုပဲ အကောင့်ပြောင်းရင် သူ့ data နဲ့သူ ပေါ်မယ်)
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    document.getElementById('user-img').src = data.profilePic || user.photoURL || "https://via.placeholder.com/100";
                    document.getElementById('u-balance').innerText = (data.balance || 0).toLocaleString();
                    renderChart(data.purchase_history);
                });
            } else {
                // အကောင့်မရှိရင် Login ကို ပြန်ပို့မယ်
                window.location.href = "index.html";
            }
        });

        // --- Sign Out Function ---
        function signOutUser() {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }

        // --- Chart logic ---
        function renderChart(history) {
            const labels = history ? Object.values(history).map(i => i.date) : [];
            const prices = history ? Object.values(history).map(i => i.price) : [];
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ data: prices, borderColor: '#4834d4', fill: true, backgroundColor: 'rgba(72, 52, 212, 0.1)', tension: 0.4 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        // --- Profile Image Upload ---
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 150; canvas.height = 150;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 150, 150);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    db.ref('users/' + auth.currentUser.uid).update({ profilePic: base64 });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
