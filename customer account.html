<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Profile Update</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #b88e2f; --dark: #2d3436; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }

        /* Profile Banner & Image Upload */
        .profile-banner {
            background: linear-gradient(135deg, #1b263b 0%, #415a77 100%);
            padding: 45px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
            position: relative;
        }
        .profile-img-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        #user-img {
            width: 95px; height: 95px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            object-fit: cover;
            background: #eee;
        }
        .upload-overlay {
            position: absolute; bottom: 0; right: 0;
            background: var(--gold);
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #fff;
            font-size: 14px;
        }

        /* Wallet & Sections */
        .wallet-card {
            background: white; margin: -25px 20px 20px 20px;
            padding: 20px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .section-box { background: white; margin: 20px; padding: 20px; border-radius: 20px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 12px 0;
            display: flex; border-top: 1px solid #eee;
        }
        .nav-item { text-align: center; color: #b2bec3; text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <input type="file" id="profile-upload" accept="image/*" style="display: none;">

    <div class="profile-banner">
        <div class="profile-img-container" onclick="document.getElementById('profile-upload').click()">
            <img id="user-img" src="https://via.placeholder.com/95" alt="User">
            <div class="upload-overlay"><i class="fa-solid fa-camera"></i></div>
        </div>
        <span style="display: block; font-size: 20px; font-weight: 800; margin-top: 10px;" id="user-name">Loading...</span>
        <span style="font-size: 11px; opacity: 0.7;">Click camera icon to change photo</span>
    </div>

    <div class="wallet-card">
        <div><small>Balance</small><br><span style="font-size: 24px; font-weight: 800; color: var(--gold);" id="coin-balance">0</span> VC</div>
        <a href="coin.html" style="background: var(--gold); color: white; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: bold;">Top-up VC</a>
    </div>

    <div class="section-box">
        <span style="font-weight: 800; margin-bottom: 15px; display: block;">📊 Spending Analytics</span>
        <canvas id="expenseChart" height="180"></canvas>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="shops.html" class="nav-item"><i class="fa-solid fa-store"></i><span>Shops</span></a>
        <a href="coin.html" class="nav-item"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
        <a href="account.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>Account</span></a>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA7JcBnkfoj-X1mOI2TMVNjv4i5NVzwYM0",
          authDomain: "veloria-v3.firebaseapp.com",
          projectId: "veloria-v3",
          storageBucket: "veloria-v3.firebasestorage.app",
          messagingSenderId: "462890026725",
          appId: "1:462890026725:web:ce9a64a58f7ac6ffdd360c",
          databaseURL: "https://veloria-v3-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                
                // Firebase ထဲမှာ ပုံရှိမရှိ အရင်စစ်မယ်
                db.ref('users/' + user.uid + '/profilePic').on('value', snap => {
                    document.getElementById('user-img').src = snap.val() || user.photoURL || 'https://via.placeholder.com/95';
                });

                db.ref('users/' + user.uid + '/balance').on('value', snap => {
                    document.getElementById('coin-balance').innerText = (snap.val() || 0).toLocaleString();
                });
            } else { window.location.href = "index.html"; }
        });

        // Profile Picture Change Logic
        document.getElementById('profile-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64String = event.target.result;
                const user = auth.currentUser;

                if (user) {
                    // Firebase Database မှာ ပုံကို Base64 နဲ့ သိမ်းမယ် (ရိုးရှင်းအောင်လို့ပါ)
                    db.ref('users/' + user.uid).update({
                        profilePic: base64String
                    }).then(() => {
                        alert("Profile updated successfully!");
                    }).catch(err => alert("Error uploading: " + err.message));
                }
            };
            reader.readAsDataURL(file);
        });

        // Placeholder Chart
        const ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['May 1', 'May 5', 'May 10', 'May 14'], datasets: [{ data: [0, 500, 200, 1000], borderColor: '#4834d4', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
